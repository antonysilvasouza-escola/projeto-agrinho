<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Door Clicker Tycoon - Edição Brasília</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a24;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        h1 {
            color: #f1c40f;
            margin-bottom: 5px;
            text-align: center;
        }

        .placar {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2ecc71;
            margin-bottom: 20px;
            background: #111;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        /* Container da Porta */
        .cenario {
            width: 180px;
            height: 270px;
            background-color: #2c3e50;
            border: 8px solid #34495e;
            border-bottom: none;
            position: relative;
            perspective: 600px;
            cursor: pointer;
        }

        .porta {
            width: 100%;
            height: 100%;
            background-color: #a04000;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: left center;
            transition: transform 0.1s ease, border 0.3s;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            box-sizing: border-box;
            padding-right: 15px;
            z-index: 2;
        }

        .porta:active {
            transform: scale(0.97) rotateY(-10deg);
        }

        /* Alerta visual de alguém batendo */
        .porta.tremendo {
            animation: tremer 0.1s infinite;
            border: 4px solid #e74c3c;
        }

        @keyframes tremer {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            85% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(2px, -2px) rotate(0deg); }
        }

        .macaneta {
            width: 15px;
            height: 15px;
            background-color: #f1c40f;
            border-radius: 50%;
        }

        .interior {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            z-index: 1;
        }

        /* Alerta de Perigo */
        .alerta-container {
            height: 40px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .alerta-ativo {
            color: #e74c3c;
            animation: piscar 0.5s infinite alternate;
        }

        @keyframes piscar {
            from { opacity: 1; }
            to { opacity: 0.3; }
        }

        /* Botão Especial de Atender */
        #btnAtender {
            background-color: #e67e22;
            padding: 10px 20px;
            font-size: 1.1rem;
            display: none;
            margin-top: 5px;
            box-shadow: 0 0 15px #e67e22;
        }

        #btnAtender:hover {
            background-color: #d35400;
        }

        /* Loja de Upgrades */
        .loja {
            margin-top: 20px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .upgrade-card {
            background-color: #2c3e50;
            padding: 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #34495e;
        }

        .upgrade-info h3 {
            margin: 0;
            font-size: 1rem;
            color: #ecf0f1;
        }

        .upgrade-info p {
            margin: 2px 0 0 0;
            font-size: 0.8rem;
            color: #bdc3c7;
        }

        button {
            padding: 8px 15px;
            font-weight: bold;
            background-color: #2ecc71;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #27ae60;
        }

        button:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
        }

        .estatisticas {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #95a5a6;
        }

        /* Tela de Game Over (Lula roubou) */
        .lula-evento {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(139, 0, 0, 0.95);
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .lula-evento h2 {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .lula-evento p {
            font-size: 1.4rem;
            color: #f1c40f;
            max-width: 500px;
        }
    </style>
</head>
