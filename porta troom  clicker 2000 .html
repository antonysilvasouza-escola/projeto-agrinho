<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker da Porta Secreta</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a24;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        h1 {
            color: #f1c40f;
            margin-bottom: 5px;
        }

        .placar {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2ecc71;
            margin-bottom: 20px;
            background: #111;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        /* Container da Porta */
        .cenario {
            width: 180px;
            height: 270px;
            background-color: #2c3e50;
            border: 8px solid #34495e;
            border-bottom: none;
            position: relative;
            perspective: 600px;
            cursor: pointer;
        }

        .porta {
            width: 100%;
            height: 100%;
            background-color: #a04000;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: left center;
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            box-sizing: border-box;
            padding-right: 15px;
            z-index: 2;
        }

        /* Efeito visual ao clicar na porta */
        .porta:active {
            transform: scale(0.97) rotateY(-10deg);
        }

        .macaneta {
            width: 15px;
            height: 15px;
            background-color: #f1c40f;
            border-radius: 50%;
        }

        .interior {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            z-index: 1;
        }

        /* Loja de Upgrades */
        .loja {
            margin-top: 25px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .upgrade-card {
            background-color: #2c3e50;
            padding: 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #34495e;
        }

        .upgrade-info h3 {
            margin: 0;
            font-size: 1rem;
            color: #ecf0f1;
        }

        .upgrade-info p {
            margin: 2px 0 0 0;
            font-size: 0.8rem;
            color: #bdc3c7;
        }

        button {
            padding: 8px 15px;
            font-weight: bold;
            background-color: #2ecc71;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #27ae60;
        }

        button:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
        }

        .estatisticas {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #95a5a6;
        }
    </style>
</head>
<body>

    <h1>Door Clicker Tycoon</h1>
    <div class="placar">🪙 <span id="txtMoedas">0</span> Moedas</div>

    <!-- Elemento clicável principal -->
    <div class="cenario" onclick="clicarNaPorta()">
        <div class="interior" id="emojiInterior">🚪</div>
        <div class="porta" id="elementoPorta">
            <div class="macaneta"></div>
        </div>
    </div>

    <div class="estatisticas">
        Ganho por Clique: +<span id="txtDpc">1</span> | Automático: <span id="txtDps">0</span>/s
    </div>

    <!-- Seção da Loja -->
    <div class="loja">
        <!-- Upgrade 1 -->
        <div class="upgrade-card">
            <div class="upgrade-info">
                <h3>Grampo de Cabelo</h3>
                <p>Aumenta seu clique em +1</p>
            </div>
            <button id="btnUpgrade1" onclick="comprarClique(event)">Comprar: 🪙15</button>
        </div>

        <!-- Upgrade 2 -->
        <div class="upgrade-card">
            <div class="upgrade-info">
                <h3>Pé de Cabra Automático</h3>
                <p>Gera +1 moeda por segundo</p>
            </div>
            <button id="btnUpgrade2" onclick="comprarAuto(event)">Comprar: 🪙100</button>
        </div>
    </div>

    <script>
        // Variáveis de estado do jogo
        let moedas = 0;
        let danoPorClique = 1;
        let danoPorSegundo = 0;

        let precoUpgrade1 = 15;
        let precoUpgrade2 = 100;

        // Elementos da interface
        const txtMoedas = document.getElementById('txtMoedas');
        const txtDpc = document.getElementById('txtDpc');
        const txtDps = document.getElementById('txtDps');
        const btnUpgrade1 = document.getElementById('btnUpgrade1');
        const btnUpgrade2 = document.getElementById('btnUpgrade2');
        const emojiInterior = document.getElementById('emojiInterior');

        // Lista de emojis que aparecem dentro da porta aleatoriamente
        const tesouros = ["💎", "💰", "👑", "👻", "🍕", "🐱", "👽", "⚔️"];

        function atualizarInterface() {
            txtMoedas.innerText = Math.floor(moedas);
            txtDpc.innerText = danoPorClique;
            txtDps.innerText = danoPorSegundo;

            // Ativa ou desativa os botões baseado no dinheiro
            btnUpgrade1.disabled = moedas < precoUpgrade1;
            btnUpgrade1.innerText = `Comprar: 🪙${precoUpgrade1}`;

            btnUpgrade2.disabled = moedas < precoUpgrade2;
            btnUpgrade2.innerText = `Comprar: 🪙${precoUpgrade2}`;
        }

        // Função executada quando o usuário clica fisicamente na porta
        function clicarNaPorta() {
            moedas += danoPorClique;
            
            // Troca o emoji secreto aleatoriamente a cada clique
            const itemAleatorio = tesouros[Math.floor(randomizar(0, tesouros.length))];
            emojiInterior.innerText = itemAleatorio;

            atualizarInterface();
        }

        // Compra melhoria para o clique manual
        function comprarClique(event) {
            event.stopPropagation(); // Impede que o clique no botão ative a porta atrás
            if (moedas >= precoUpgrade1) {
                moedas -= precoUpgrade1;
                danoPorClique += 1;
                precoUpgrade1 = Math.floor(precoUpgrade1 * 1.5); // Aumenta o preço do próximo
                atualizarInterface();
            }
        }

        // Compra melhoria para ganho automático
        function comprarAuto(event) {
            event.stopPropagation();
            if (moedas >= precoUpgrade2) {
                moedas -= precoUpgrade2;
                danoPorSegundo += 1;
                precoUpgrade2 = Math.floor(precoUpgrade2 * 1.6); // Aumenta o preço do próximo
                atualizarInterface();
            }
        }

        // Função auxiliar para gerar números aleatórios usando o tempo atual
        function randomizar(min, max) {
            const x = Math.sin(Date.now()) * 10000;
            const r = x - Math.floor(x);
            return min + r * (max - min);
        }

        // Loop principal do jogo: Roda a cada 100 milissegundos (0.1 segundos)
        setInterval(function() {
            if (danoPorSegundo > 0) {
                moedas += danoPorSegundo / 10; // Adiciona a fração correspondente a 100ms
                atualizarInterface();
            }
        }, 100);

        // Inicialização
        atualizarInterface();
    </script>
</body>
</html>
